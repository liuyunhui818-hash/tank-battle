<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

.game-container {
  display: flex;
  gap: 20px;
  align-items: stretch;
}

#gameCanvas {
  border: 3px solid #555;
  background: #0a0a0a;
  image-rendering: pixelated;
}

.sidebar {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 8px;
  padding: 20px;
  color: #e0e0e0;
  min-width: 180px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.sidebar h2 {
  text-align: center;
  color: #e94560;
  font-size: 20px;
  letter-spacing: 3px;
  border-bottom: 1px solid #0f3460;
  padding-bottom: 10px;
}

.stat { display: flex; justify-content: space-between; }
.stat .label { color: #aaa; }
.stat .value { color: #fff; font-weight: bold; }

.lives { display: flex; gap: 5px; }
.life-icon { width: 20px; height: 20px; background: #4ecca3; border-radius: 2px; }

.controls { font-size: 11px; color: #aaa; line-height: 1.8; }
.controls span { color: #e94560; font-weight: bold; }

#restartBtn {
  background: #e94560;
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}
#restartBtn:hover { background: #c23152; }
</style>
</head>

<body>

<div class="game-container">
  <canvas id="gameCanvas"></canvas>

  <div class="sidebar">
    <h2>坦 克 大 战</h2>

    <div class="stat"><span class="label">关卡</span><span class="value" id="levelDisplay">1</span></div>
    <div class="stat"><span class="label">分数</span><span class="value" id="scoreDisplay">0</span></div>
    <div class="stat"><span class="label">击杀</span><span class="value" id="killsDisplay">0</span></div>

    <div class="stat">
      <span class="label">生命</span>
      <div class="lives" id="livesDisplay"></div>
    </div>

    <div class="controls">
      <span>WASD / 方向键</span> 移动<br>
      <span>空格 / J</span> 开火<br>
      <span>P</span> 暂停
    </div>

    <button id="restartBtn">重新开始</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE = 32;
const COLS = 20;
const ROWS = 18;

canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// =======================
// 🎮 键盘系统（已修复）
// =======================
const keys = {};

window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  // 阻止方向键 & 空格滚动页面
  if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }

  keys[key] = true;

  if (key === ' ') {
    if (gameState === 'waiting') startGame();
    else if (gameState === 'over') restartGame();
  }

  if (key === 'p') togglePause();
});

window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

// =======================
// 游戏状态
// =======================
let gameState = 'waiting';
let level = 1;
let score = 0;
let kills = 0;
let lives = 3;

let player = null;
let enemies = [];
let bullets = [];
let walls = [];
let particles = [];

// =======================
// 坦克类
// =======================
class Tank {
  constructor(x, y, dir, color, speed) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.speed = speed;
    this.size = TILE - 4;
    this.reload = 0;
    this.alive = true;
  }

  move(dx, dy, dir) {
    let nx = this.x + dx * this.speed;
    let ny = this.y + dy * this.speed;

    this.x = nx;
    this.y = ny;
    this.dir = dir;
  }

  shoot() {
    if (this.reload > 0) return null;
    this.reload = 20;

    let cx = this.x + TILE / 2;
    let cy = this.y + TILE / 2;

    return new Bullet(cx, cy, this.dir, this);
  }

  update() {
    if (this.reload > 0) this.reload--;
  }

  draw() {
    if (!this.alive) return;

    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, TILE - 4, TILE - 4);
  }
}

// =======================
// 子弹
// =======================
class Bullet {
  constructor(x, y, dir, owner) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.owner = owner;
    this.alive = true;
    this.speed = 6;
  }

  update() {
    if (this.dir === 0) this.y -= this.speed;
    if (this.dir === 1) this.x += this.speed;
    if (this.dir === 2) this.y += this.speed;
    if (this.dir === 3) this.x -= this.speed;

    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.alive = false;
    }
  }

  draw() {
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.x, this.y, 4, 4);
  }
}

// =======================
// 初始化
// =======================
function startGame() {
  gameState = 'playing';
  player = new Tank(200, 400, 0, '#4ecca3', 3);
}

function restartGame() {
  gameState = 'waiting';
  player = null;
}

function togglePause() {
  if (gameState === 'playing') gameState = 'paused';
  else if (gameState === 'paused') gameState = 'playing';
}

// =======================
// 更新逻辑（关键修复移动）
// =======================
function update() {
  if (gameState !== 'playing') return;

  if (!player) return;

  // ⭐ 修复后的移动系统
  if (keys['arrowup'] || keys['w']) player.move(0, -1, 0);
  if (keys['arrowdown'] || keys['s']) player.move(0, 1, 2);
  if (keys['arrowleft'] || keys['a']) player.move(-1, 0, 3);
  if (keys['arrowright'] || keys['d']) player.move(1, 0, 1);

  if (keys[' '] || keys['j']) {
    let b = player.shoot();
    if (b) bullets.push(b);
  }

  bullets.forEach(b => b.update());
  bullets = bullets.filter(b => b.alive);

  player.update();
}

// =======================
// 绘制
// =======================
function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (player) player.draw();
  bullets.forEach(b => b.draw());

  if (gameState === 'waiting') {
    ctx.fillStyle = '#fff';
    ctx.fillText('按空格开始', 180, 200);
  }

  if (gameState === 'paused') {
    ctx.fillStyle = '#fff';
    ctx.fillText('暂停', 200, 200);
  }

  if (gameState === 'over') {
    ctx.fillStyle = '#f00';
    ctx.fillText('GAME OVER', 180, 200);
  }
}

// =======================
// 游戏循环
// =======================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
